<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChaiTailwind Demo</title>
</head>

 

<body class="chai-bg-black chai-text-white chai-p-10" style="font-family: Arial, sans-serif;">

  <!-- Title -->
  <h1 class="chai-text-white chai-p-2">
    ChaiTailwind Demo
  </h1>

  <p class="chai-m-2">
    Custom utility-first CSS engine using JavaScript
  </p>

  <!-- Color Cards -->
  <div class="chai-m-3">

    <div class="chai-p-3 chai-m-2 chai-bg-red-500 chai-text-white">
      Red 500
    </div>

    <div class="chai-p-3 chai-m-2 chai-bg-blue-500 chai-text-white">
      Blue 500
    </div>

    <div class="chai-p-3 chai-m-2 chai-bg-green-500 chai-text-white">
      Green 500
    </div>

    <div class="chai-p-3 chai-m-2 chai-bg-yellow-500 chai-text-black">
      Yellow 500
    </div>

    <div class="chai-p-3 chai-m-2 chai-bg-purple-500 chai-text-white">
      Purple 500
    </div>

    <div class="chai-p-3 chai-m-2 chai-bg-pink-500 chai-text-white">
      Pink 500 
    </div>

  </div>

  <!-- Hover Buttons -->
  <h2 class="chai-m-2">Hover Effects</h2>

  <button class="chai-p-2 chai-m-2 chai-bg-blue-500 chai-text-white hover:chai-bg-red-500">
    Hover Blue → Red
  </button>

  <button class="chai-p-2 chai-m-2 chai-bg-green-500 chai-text-white hover:chai-bg-purple-500">
    Hover Green → Purple
  </button>

  <button class="chai-p-2 chai-m-2 chai-bg-pink-500 chai-text-white hover:chai-bg-yellow-500">
    Hover Pink → Yellow
  </button>

  <!-- Mixed Section -->
  <h2 class="chai-m-3">Combined Utilities</h2>

  <div class="chai-p-4 chai-m-2 chai-bg-blue-300 chai-text-black">
    Light blue card with padding and margin
  </div>

  <div class="chai-p-4 chai-m-2 chai-bg-red-700 chai-text-white">
    Dark red card
  </div>

  <!-- Script -->
    <script type="module" src="main.js"></script>
 

</body>
</html>
